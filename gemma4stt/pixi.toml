[workspace]
channels = ["conda-forge"]
name = "gemma4stt"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
start = "python main.py"
test-audio = "python test_gemma4_audio.py"
download-voice = "python -m piper.download_voices sv_SE-nst-medium --data-dir voices"
[dependencies]
python = "3.11.*"
portaudio = ">=19.7.0,<20"
ffmpeg = "*"
pkg-config = "*"
av = ">=17.1.0,<18"

[pypi-dependencies]
sounddevice = ">=0.5.5, <0.6"
numpy = "*"
soundfile = ">=0.14.0, <0.15"
ollama = ">=0.6.2, <0.7"
faster-whisper = ">=1.2.1, <2"
piper-tts = ">=1.2.0"
